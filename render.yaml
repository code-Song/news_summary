services:
  - type: web
    name: news-summary-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NAVER_API_KEY
        sync: false
      - key: NAVER_SECRET_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DAILY_HOUR
        value: "6"
      - key: DAILY_MINUTE
        value: "0"
      - key: TZ
        value: Asia/Seoul
      - key: PORT
        value: "7860"
      # 웹훅 자동 연결을 위한 환경변수
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          name: news-summary-bot
          type: web
          property: host
